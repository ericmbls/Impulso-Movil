<ion-content fullscreen>

  <div class="qr-container">

    <div class="hero">

      <div class="hero-content">

        <h1>
          <ion-icon name="qr-code-outline"></ion-icon>
          Mi código QR
        </h1>

        <p>
          Muéstralo al docente para registrar tu asistencia.
        </p>

      </div>

    </div>

    <div class="qr-card">

      @if (loading) {

        <div class="loading">

          <ion-icon
            name="refresh-outline"
            class="loading-icon">
          </ion-icon>

          <p>Cargando código QR...</p>

        </div>

      } @else {

        @if (qr?.isValid) {

          <img
            [src]="qr?.qrImage"
            alt="Código QR de asistencia"
            class="qr-image" />

          <p class="expires">
            <ion-icon name="time-outline"></ion-icon>
            Expira en
            <strong>{{ countdown }}</strong>
          </p>

        } @else {

          <div class="expired">

            <ion-icon name="time-outline"></ion-icon>

            <p>El código QR ha expirado.</p>

          </div>

        }

      }

    </div>

  </div>

</ion-content>
