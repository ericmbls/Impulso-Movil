<div class="student-card">

  <div class="avatar">
    {{ user().photo }}
  </div>

  <div class="info">

    <h2>{{ user().name }}</h2>

    <p>
      <ion-icon name="mail-outline"></ion-icon>
      {{ user().email }}
    </p>

    <small>
      <ion-icon name="call-outline"></ion-icon>
      {{ user().phone }}
    </small>

  </div>

  <span class="status-badge">
    <ion-icon name="ellipse"></ion-icon>
    Activo
  </span>

</div>
