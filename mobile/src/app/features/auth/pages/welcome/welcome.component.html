<ion-content fullscreen>
  <div class="welcome-container">
    <div class="hero">
      <div class="hero-content">
        <ion-icon name="school-outline" class="brand-icon"></ion-icon>
        <h1>IMPULSO</h1>
        <p>Sistema Escolar Inteligente</p>
        <span class="badge">CBTIS No. 61</span>
      </div>
      <div class="hero-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
      </div>
    </div>

    <div class="welcome-card">
      <h2>¡Bienvenido!</h2>
      <p class="welcome-text">
        Gestiona tu asistencia, calificaciones y horario escolar desde un solo lugar.
      </p>
      <ion-button expand="block" class="welcome-btn" (click)="goToLogin()">
        <ion-icon slot="start" name="log-in-outline"></ion-icon>
        Comenzar
      </ion-button>
    </div>

    <div class="footer">
      <p>Versión 1.0.0</p>
      <small>© 2026 CBTIS No. 61</small>
    </div>
  </div>
</ion-content>
