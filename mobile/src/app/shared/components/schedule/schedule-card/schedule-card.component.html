<div class="schedule-card">
  <div class="color-bar" [style.background]="color"></div>
  <div class="info">
    <p class="subject">{{ subject }}</p>
    <div class="meta">
      <span class="teacher">{{ teacher }}</span>
      <span class="classroom">{{ classroom }}</span>
    </div>
  </div>
  <div class="time">
    <ion-icon name="time-outline"></ion-icon>
    {{ time }}
  </div>
</div>
