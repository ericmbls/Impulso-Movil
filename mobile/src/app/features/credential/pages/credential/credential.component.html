<ion-content fullscreen>

  <div class="credential-page">

    <h1>Mi Credencial</h1>
    <p class="subtitle">Centro de Bachillerato Tecnológico Industrial y de Servicios No. 61</p>

    <ion-card class="credential-card">

      <ion-card-content>

        <div class="header">

          <img
            src="assets/images/logos/cbtis61.png"
            alt="CBTIS 61"
            class="logo">

          <div>
            <h2>CBTIS 61</h2>
            <span>Credencial Digital</span>
          </div>

        </div>

        <div class="photo">

          <ion-avatar>

            <img src="assets/images/avatars/student.png">

          </ion-avatar>

        </div>

        <div class="info">

          <h3>{{ student.name }}</h3>

          <p>{{ student.career }}</p>

          <p>{{ student.semester }}° "{{ student.group }}"</p>

          <p>Matrícula: {{ student.enrollment }}</p>

        </div>

        <div class="qr">

          <img
            src="assets/images/credential/qr-demo.png"
            alt="QR">

        </div>

        <div class="validity">

          Vigencia {{ student.validity }}

        </div>

      </ion-card-content>

    </ion-card>

    <div class="buttons">

      <ion-button expand="block">
        Actualizar QR
      </ion-button>

      <ion-button
        expand="block"
        fill="outline">
        Compartir
      </ion-button>

    </div>

  </div>

</ion-content>
